name: CalCareers Env/Tox Watcher

on:
  # Daily — CalCareers postings change at day resolution and the portal is slow,
  # so once per day is plenty. Runs at 16:07 UTC (~9am PT) plus on demand.
  schedule:
    - cron: "7 16 * * *"
  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: CalCareers scrape
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape CalCareers (California state jobs)
        run: python scrape_jobs.py --calcareers-only
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          NOTIFY_MIN_FIT: ${{ vars.NOTIFY_MIN_FIT }}

      - name: Commit results to repo
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add -f output/calcareers_jobs.json output/calcareers_jobs.md output/calcareers_jobs.html output/all_jobs.json output/notified.json
          git diff --cached --quiet || git commit -m "chore: update calcareers listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase origin main
          git push
