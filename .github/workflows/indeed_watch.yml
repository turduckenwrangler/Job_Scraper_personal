name: Indeed Env/Tox Watcher

on:
  # Native GitHub cron, hourly at :47 during the active window (8am–8pm PT ≈
  # 15:00–03:00 UTC). Offset from LinkedIn (:17) to reduce contention on the
  # commit-push concurrency group. (Indeed has no watchdog backup, so this
  # native schedule is its only automatic trigger — add cron-job.org too if you
  # want belt-and-suspenders.)
  schedule:
    - cron: "47 15-23,0-3 * * *"
  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: Indeed scrape
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Indeed deps
        run: pip install -r requirements.txt

      - name: Scrape Indeed (last 24h)
        run: python scrape_jobs.py --indeed-only

      - name: Record workflow run
        run: |
          python - <<'EOF'
          import json
          import os
          from datetime import datetime, timezone

          with open("indeed_jobs.json", encoding="utf-8") as f:
              data = json.load(f)

          entry = {
              "workflow": "indeed",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "job_count": int(data.get("total", 0)),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }

          with open("workflow_runs.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(entry, sort_keys=True) + "\n")
          EOF

      - name: Commit results to repo
        run: |
          git config user.name  "ScottCoffin"
          git config user.email "ScottCoffin@users.noreply.github.com"
          git add indeed_jobs.json indeed_jobs.md indeed_jobs.html workflow_runs.jsonl all_jobs.json
          git diff --cached --quiet || git commit -m "chore: update indeed listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase origin main
          git push
