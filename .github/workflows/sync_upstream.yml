name: Sync from upstream

# Pull the latest scraper/dashboard improvements from the source template repo.
# Safe to run at any time — merges with -X ours so your config.json,
# scoring_profile.json, and output/ data always take precedence over anything
# in upstream on conflict.
#
# UPSTREAM SOURCE: https://github.com/ScottCoffin/Job_Scraper
# Do NOT point this at your own personal fork.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC — weekly check for improvements
  workflow_dispatch:        # or run manually any time via Actions tab

jobs:
  sync:
    name: Merge upstream code improvements
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge from upstream
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git remote add upstream https://github.com/ScottCoffin/Job_Scraper.git
          git fetch upstream main

          # Merge upstream code. -X ours resolves any conflicts by keeping this
          # fork's version — most importantly, this preserves the fork's own
          # output/ data files if upstream also has data committed there.
          # Conflicts on code files (rare, only if you edited the same lines as
          # upstream) are also resolved in the fork's favour; inspect the merge
          # commit if you want to manually reconcile those.
          git merge upstream/main --no-edit -X ours \
            -m "chore: sync from upstream [$(date -u '+%Y-%m-%d')]"
          git push origin main
          echo "✅ Synced successfully."
